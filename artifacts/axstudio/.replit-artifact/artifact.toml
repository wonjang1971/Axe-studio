kind = "web"
previewPath = "/"
title = "AX Studio Homepage"
version = "1.0.0"
id = "artifacts/axstudio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20873

[services.development]
run = "pnpm --filter @workspace/axstudio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/axstudio", "run", "build" ]
publicDir = "artifacts/axstudio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20873"
BASE_PATH = "/"
